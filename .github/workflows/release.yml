name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -count=1

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build collector
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o collector-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/collector/
          go build -ldflags="-s -w" -o query-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/query/

      - name: Package
        run: |
          tar czf ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            collector-${{ matrix.goos }}-${{ matrix.goarch }} \
            query-${{ matrix.goos }}-${{ matrix.goarch }} \
            scripts/ examples/ Makefile README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ai-collector-*.tar.gz
