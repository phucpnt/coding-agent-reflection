name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -count=1

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildDate=${BUILD_DATE}" \
            -o ai-collector-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ai-collector/

      - name: Package
        run: |
          tar czf ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            ai-collector-${{ matrix.goos }}-${{ matrix.goarch }} \
            scripts/ prompts/ examples/ README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ai-collector-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ai-collector-*.tar.gz
